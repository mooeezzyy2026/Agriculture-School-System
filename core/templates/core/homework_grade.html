{% extends 'core/base.html' %}
{% block content %}
<div class="card">
    <h3>Grade Submission</h3>
    <p>{{ sub.submission_text }}</p>
    <form method="POST">
        {% csrf_token %}
        <input type="number" name="points_earned" placeholder="Points" required>
        <textarea name="feedback" placeholder="Feedback"></textarea>
        <button type="submit">Save Grade</button>
    </form>
</div>
{% endblock %}
