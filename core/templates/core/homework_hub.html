{% extends 'core/base.html' %}
{% block content %}
<div class="card">
    <h3>Homework Hub</h3>
    {% if is_student %}
        <table id="assignmentTable">
            <thead><tr><th>Title</th><th>Action</th></tr></thead>
            <tbody>
            {% for assignment in assignments %}
                <tr><td>{{ assignment.title }}</td><td><a href="{% url 'student_submit_homework' assignment.id %}">Submit</a></td></tr>
            {% endfor %}
            </tbody>
        </table>
    {% else %}
        <!-- Teacher View -->
        <form method="POST">
            {% csrf_token %}
            <select name="course">{% for c in courses %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select>
            <input type="text" name="title" placeholder="Title" required>
            <textarea name="instructions" placeholder="Instructions"></textarea>
            <input type="date" name="due_date" required>
            <button type="submit">Publish</button>
        </form>
    {% endif %}
</div>
{% endblock %}
