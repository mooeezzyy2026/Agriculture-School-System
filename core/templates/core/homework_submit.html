{% extends 'core/base.html' %}
{% block content %}
<div class="card">
    <h3>Submit Homework: {{ assignment.title }}</h3>
    <form method="POST">
        {% csrf_token %}
        <textarea name="submission_text" rows="10" style="width:100%"></textarea>
        <button type="submit">Submit</button>
    </form>
</div>
{% endblock %}
