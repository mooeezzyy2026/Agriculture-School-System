<header>
            <h1>{% block header_title %}Dashboard{% endblock %}</h1>
            <div style="display: flex; align-items: center; gap: 1.5rem;">
                <!-- Real-time Clock -->
                <div style="text-align: right; font-size: 0.85rem; color: #475569;">
                    <span id="live-date" style="display: block; font-weight: 600;"></span>
                    <span id="live-clock" style="display: block; font-family: monospace; font-size: 1rem; color: var(--primary-hover);"></span>
                </div>
                
                {% if user.is_authenticated %}
                <div class="header-user-badge">
                    <div class="avatar-circle">
                        {{ user.get_initials }}
                    </div>
                    <div style="font-weight: 500; font-size: 0.9rem; color: #475569;">
                        User: <span style="font-weight: 700; color: var(--primary-hover);">{{ user.get_full_name|default:user.username }}</span>
                    </div>
                </div>
                {% endif %}
            </div>
        </header>
